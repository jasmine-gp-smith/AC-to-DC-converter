<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PCB 3D Viewer</title>

    <!-- Google model-viewer -->
    <script type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    </script>

    <style>
      body {
        margin: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      model-viewer {
        width: 95vw;
        height: 90vh;
      }
    </style>
  </head>

  <body>
    <model-viewer
      src="./ACtoDC3d.glb"
      alt="PCB 3D Model"
      auto-rotate
      camera-controls
      shadow-intensity="1"
      exposure="1"
      environment-image="neutral">
    </model-viewer>
  </body>
</html>
